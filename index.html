<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>晶玻智作 V Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <h1>晶玻智作 V Glass</h1>
            <nav>
                <a href="#about">關於我們</a>
                <a href="#products">產品類型</a>
                <a href="#contact">詢價</a>
            </nav>
        </div>        
    </header>

    <main>
        <div class="container-main">
            <section id="about" class="section-block">
                <h2>關於我們<h2>
                    <p id="about-text">晶玻智作 V Glass 位於彰化, 結合了 AI 設計技術與十年玻璃加工經驗, 專注於裝飾玻璃製造。</p>
                    <p class="notice">🔧 網站建置中，如有詢價需求請填寫下方表單，我們會盡快與您聯繫。</p>

                    <div class="carousel">
                        <button class="carousel-btn prev">&#8249;</button>

                        <div class="carousel-slide">
                            <img id="before-img" src="before1.jpg" alt="加工前：强化平面透明玻璃">
                            <img id="after-img" src="after1.jpg" alt="加工後：客制化花紋藝術玻璃">
                        </div>

                        <button class="carousel-btn next">&#8250;</button>
                    </div>

                    <div class="carousel-info">
                        <p id="carousel-counter" style="color:#888; font-size: 14px;">1 / 5</p>
                        <h3 id="slide-title">客訂浮雕花紋藝術玻璃（睡蓮）｜書房隔間</h3>
                        <p id="slide-desc">原設計使用透明玻璃，用彩色浮雕替代後空間更顯優雅</p>
                    </div>                    
                </div>    
            </section>
            <section id="products" class="section-block">
                <h2>產品類型</h2>
                <div class="product-list">
                    <div class="product-card">
                        <h3>霧面浮雕玻璃</h3>
                        <p>適合浴室、隔間、門片</p>
                    </div>
                    <div class="product-card">
                        <h3>透明浮雕玻璃</h3>
                        <p>適合櫥窗、展示櫃、屏風</p>
                    </div>
                    <div class="product-card">
                        <h3>客製化彩色浮雕加工</h3>
                        <p>任意圖案，尺寸訂製</p>
                    </div>
                </div>
            </section>
            <section id="contact" class="section-block">
                <h2>詢價</h2>
                <form>
                    <label for="name">姓名</label>
                    <input type="text" id="name" placeholder="請輸入姓名">

                    <label for="phone">電話</label>
                    <input type="tel" id="phone" placeholder="請輸入電話">

                    <label for="topic">詢問主題</label>
                    <select id="topic">
                        <option value="price">價格詢問</option>
                        <option value="sample">樣品申請</option>
                        <option value="custom">客製化需求</option>
                    </select>

                    <label for="message">説明</label>
                    <textarea id="message" placeholder="請描述您的需求..."></textarea>

                    <button type="submit">送出詢價</button>
                </form>            
            </section>
         </div>        
    </main>

    <footer>
        <div class="container">
            <p>© 2026 晶玻智作 V Glass｜彰化製造</p>
        </div>        
    </footer>

    <script src="script.js"></script>
    
</body>
</html>
